name = "tvbox"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# 自定义域名（可选，推荐配置）
# 取消注释并替换为你自己的域名和 Zone ID
# routes = [
#   { pattern = "mtv.dpdns.org/*", zone_id = "box" }
# ]

[triggers]
crons = ["0 * * * *"]  # 每小时触发，实际执行频率由 Admin 设置的聚合间隔控制

[[kv_namespaces]]
binding = "KV"
id = "59f3a80b569d4f7bb73346a865b67b0c"
preview_id = "59f3a80b569d4f7bb73346a865b67b0c"

[vars]
SPEED_TIMEOUT_MS = "5000"   # 源地址延迟阈值（毫秒）
SITE_TIMEOUT_MS = "3000"    # 站点 API 延迟阈值（毫秒）
FETCH_TIMEOUT_MS = "5000"   # 抓取配置 JSON 超时（毫秒）
WORKER_BASE_URL = "https://mtv.dpdns.org"  # CF 边缘代理依赖此配置（JAR/MacCMS/直播源代理）
